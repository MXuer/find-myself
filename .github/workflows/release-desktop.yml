name: Release Desktop Installers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build Apple Silicon DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        run: rustup default stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build DMG
        run: npm run tauri:build:dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        run: rustup default stable

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri:build:windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Native desktop test build.

          Includes:
          - Tauri desktop workbench UI
          - Local Python face-search engine bundled with the app
          - DMG installer for Apple Silicon Macs
          - NSIS setup installer for Windows x64

          Notes:
          - The macOS build is unsigned and not notarized, so Gatekeeper may require manual approval.
          - The Windows build is unsigned, so SmartScreen may show a warning.
          - The first recognition run may download InsightFace model weights locally.
          - Project code is MIT licensed; model weights follow their own license policy.
          EOF

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          TITLE="Find Myself ${VERSION}"
          ASSETS=(release-assets/*/*)

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TITLE" --notes-file release-notes.md
            gh release upload "$TAG_NAME" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${ASSETS[@]}" \
              --title "$TITLE" \
              --notes-file release-notes.md
          fi
